<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Das Auge Saurons</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #000;
    overflow: hidden;
    width: 100vw;
    height: 100vh;
    cursor: none;
  }
  canvas { display: block; width: 100vw; height: 100vh; }
  #inscription {
    position: fixed;
    bottom: 8%;
    left: 50%;
    transform: translateX(-50%);
    text-align: center;
    font-family: 'Palatino Linotype', 'Book Antiqua', Palatino, serif;
    font-style: italic;
    pointer-events: none;
    z-index: 10;
    opacity: 0;
    animation: fadeInText 3s ease-out 1.5s forwards;
  }
  #inscription .black-speech {
    color: #cc8800;
    font-size: clamp(0.7rem, 1.8vw, 1.1rem);
    letter-spacing: 0.12em;
    line-height: 1.9;
    text-shadow: 0 0 15px rgba(255,80,0,0.6), 0 0 30px rgba(255,40,0,0.3);
    animation: textBurn 4s ease-in-out infinite;
  }
  #inscription .german {
    color: #886633;
    font-size: clamp(0.6rem, 1.4vw, 0.85rem);
    letter-spacing: 0.06em;
    line-height: 1.7;
    margin-top: 0.6rem;
    opacity: 0.6;
  }
  #badge {
    position: fixed;
    bottom: 2%;
    left: 50%;
    transform: translateX(-50%);
    color: #443322;
    font-family: monospace;
    font-size: 0.65rem;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    pointer-events: none;
    z-index: 10;
    opacity: 0;
    animation: fadeInText 2s ease-out 3s forwards;
  }
  @keyframes fadeInText {
    to { opacity: 1; }
  }
  @keyframes textBurn {
    0%, 100% { text-shadow: 0 0 15px rgba(255,80,0,0.5), 0 0 30px rgba(255,40,0,0.3); }
    50% { text-shadow: 0 0 25px rgba(255,100,0,0.9), 0 0 50px rgba(255,60,0,0.5), 0 0 80px rgba(255,40,0,0.3); }
  }
</style>
</head>
<body>
<canvas id="c"></canvas>
<div id="inscription">
  <div class="black-speech">
    Ash nazg durbatuluk, ash nazg gimbatul,<br>
    ash nazg thrakatuluk, agh burzum-ishi krimpatul.
  </div>
  <div class="german">
    Ein Ring, sie zu knechten, sie alle zu finden,<br>
    ins Dunkel zu treiben und ewig zu binden.
  </div>
</div>
<div id="badge">Built by Claude in 2 minutes</div>

<script>
const canvas = document.getElementById('c');
const gl = canvas.getContext('webgl2') || canvas.getContext('webgl');

let mx = 0.5, my = 0.5;
document.addEventListener('mousemove', e => {
  mx = e.clientX / window.innerWidth;
  my = 1.0 - e.clientY / window.innerHeight;
});
document.addEventListener('touchmove', e => {
  e.preventDefault();
  mx = e.touches[0].clientX / window.innerWidth;
  my = 1.0 - e.touches[0].clientY / window.innerHeight;
}, { passive: false });

function resize() {
  canvas.width = window.innerWidth * devicePixelRatio;
  canvas.height = window.innerHeight * devicePixelRatio;
  gl.viewport(0, 0, canvas.width, canvas.height);
}
window.addEventListener('resize', resize);
resize();

const vs = `attribute vec2 p;void main(){gl_Position=vec4(p,0,1);}`;
const fs = `
#ifdef GL_ES
precision highp float;
#endif
uniform float t;
uniform vec2 r;
uniform vec2 m;

// Noise functions
float hash(vec2 p) {
  return fract(sin(dot(p, vec2(127.1, 311.7))) * 43758.5453);
}

float noise(vec2 p) {
  vec2 i = floor(p);
  vec2 f = fract(p);
  f = f * f * (3.0 - 2.0 * f);
  return mix(
    mix(hash(i), hash(i + vec2(1,0)), f.x),
    mix(hash(i + vec2(0,1)), hash(i + vec2(1,1)), f.x),
    f.y
  );
}

float fbm(vec2 p) {
  float v = 0.0, a = 0.5;
  mat2 rot = mat2(0.8, 0.6, -0.6, 0.8);
  for (int i = 0; i < 5; i++) {
    v += a * noise(p);
    p = rot * p * 2.0;
    a *= 0.5;
  }
  return v;
}

void main() {
  vec2 uv = (gl_FragCoord.xy - 0.5 * r) / min(r.x, r.y);

  // Mouse influence on pupil direction
  vec2 look = (m - 0.5) * 0.15;

  // Eye shape - elongated ellipse
  float eyeShape = length(uv * vec2(1.0, 2.2));

  // Slit pupil
  vec2 pupilUV = uv - look;
  float slit = smoothstep(0.015, 0.005, abs(pupilUV.x)) *
               smoothstep(0.45, 0.1, abs(pupilUV.y));

  // Iris rings
  float irisR = length(pupilUV);
  float iris = smoothstep(0.25, 0.15, irisR) * smoothstep(0.02, 0.08, irisR);

  // Iris detail - rotating fibers
  float angle = atan(pupilUV.y, pupilUV.x);
  float fibers = 0.5 + 0.5 * sin(angle * 12.0 + t * 0.3 + sin(angle * 5.0) * 2.0);
  float fibers2 = 0.5 + 0.5 * sin(angle * 8.0 - t * 0.5 + cos(angle * 3.0) * 3.0);
  iris *= mix(0.6, 1.0, fibers * fibers2);

  // Fire/flame effect around eye
  vec2 fireUV = uv * 3.0;
  float fire = fbm(fireUV + vec2(0, -t * 0.8));
  float fire2 = fbm(fireUV * 1.5 + vec2(t * 0.3, -t * 1.2));
  float fireIntensity = fire * fire2;

  // Eye mask with fire distortion
  float eyeEdge = smoothstep(0.5, 0.35, eyeShape + fireIntensity * 0.15);

  // Outer glow
  float glow = exp(-eyeShape * 2.5) * (0.6 + 0.4 * sin(t * 1.5));
  float outerGlow = exp(-eyeShape * 1.2) * 0.3;

  // Color composition
  vec3 black = vec3(0.0);
  vec3 darkRed = vec3(0.4, 0.05, 0.0);
  vec3 orange = vec3(1.0, 0.4, 0.0);
  vec3 brightOrange = vec3(1.0, 0.6, 0.1);
  vec3 yellow = vec3(1.0, 0.85, 0.2);

  // Base - dark background with subtle red
  vec3 col = black;

  // Fire glow around eye
  col += darkRed * outerGlow * 2.0;
  col += orange * glow * fireIntensity;

  // Eye surface
  vec3 eyeColor = mix(darkRed, orange, smoothstep(0.45, 0.2, eyeShape));
  eyeColor = mix(eyeColor, brightOrange, smoothstep(0.3, 0.15, eyeShape));
  eyeColor *= 1.0 + fireIntensity * 0.5;
  col = mix(col, eyeColor, eyeEdge);

  // Iris
  vec3 irisColor = mix(orange, yellow, fibers * 0.5);
  col = mix(col, irisColor, iris * eyeEdge);

  // Pupil slit - deep black with orange edge glow
  float slitGlow = smoothstep(0.04, 0.01, abs(pupilUV.x)) *
                   smoothstep(0.5, 0.15, abs(pupilUV.y));
  col = mix(col, brightOrange * 1.5, (slitGlow - slit) * 0.6 * eyeEdge);
  col = mix(col, black, slit * eyeEdge);

  // Pulsing inner glow
  float pulse = 0.5 + 0.5 * sin(t * 2.0);
  col += yellow * exp(-irisR * 8.0) * 0.3 * pulse * eyeEdge;

  // Ember particles
  for (int i = 0; i < 8; i++) {
    float fi = float(i);
    float seed = hash(vec2(fi, fi * 1.7));
    vec2 ep = vec2(
      sin(seed * 6.28 + t * (0.3 + seed * 0.5)) * (0.2 + seed * 0.3),
      mod(seed * 3.0 - t * (0.2 + seed * 0.3), 1.5) - 0.75
    );
    float ember = exp(-length(uv - ep) * 60.0) * (0.5 + 0.5 * sin(t * 3.0 + fi));
    col += mix(orange, yellow, seed) * ember;
  }

  // Tower silhouette
  float tower = smoothstep(0.018, 0.012, abs(uv.x)) * step(uv.y, -0.25) * step(-0.7, uv.y);
  float towerBase = smoothstep(0.06, 0.04, abs(uv.x) - (uv.y + 0.7) * 0.08) * step(uv.y, -0.6) * step(-0.75, uv.y);
  float towerTop = smoothstep(0.03, 0.02, abs(uv.x) - (uv.y + 0.25) * -0.05) * step(uv.y, -0.22) * step(-0.3, uv.y);
  float towerMask = max(tower, max(towerBase, towerTop));
  col = mix(col, vec3(0.03, 0.01, 0.0), towerMask);
  // Tower edge glow
  col += orange * 0.15 * smoothstep(0.0, 0.02, towerMask) * (1.0 - towerMask) * glow;

  // Vignette
  vec2 vUV = gl_FragCoord.xy / r;
  float vig = 1.0 - dot(vUV - 0.5, vUV - 0.5) * 1.5;
  col *= vig;

  // Tone mapping
  col = col / (1.0 + col);
  col = pow(col, vec3(0.9));

  gl_FragColor = vec4(col, 1.0);
}
`;

function createShader(type, src) {
  const s = gl.createShader(type);
  gl.shaderSource(s, src);
  gl.compileShader(s);
  if (!gl.getShaderParameter(s, gl.COMPILE_STATUS)) {
    console.error(gl.getShaderInfoLog(s));
  }
  return s;
}

const prog = gl.createProgram();
gl.attachShader(prog, createShader(gl.VERTEX_SHADER, vs));
gl.attachShader(prog, createShader(gl.FRAGMENT_SHADER, fs));
gl.linkProgram(prog);
gl.useProgram(prog);

const buf = gl.createBuffer();
gl.bindBuffer(gl.ARRAY_BUFFER, buf);
gl.bufferData(gl.ARRAY_BUFFER, new Float32Array([-1,-1,1,-1,-1,1,1,1]), gl.STATIC_DRAW);
const pLoc = gl.getAttribLocation(prog, 'p');
gl.enableVertexAttribArray(pLoc);
gl.vertexAttribPointer(pLoc, 2, gl.FLOAT, false, 0, 0);

const tLoc = gl.getUniformLocation(prog, 't');
const rLoc = gl.getUniformLocation(prog, 'r');
const mLoc = gl.getUniformLocation(prog, 'm');

function frame(now) {
  gl.uniform1f(tLoc, now * 0.001);
  gl.uniform2f(rLoc, canvas.width, canvas.height);
  gl.uniform2f(mLoc, mx, my);
  gl.drawArrays(gl.TRIANGLE_STRIP, 0, 4);
  requestAnimationFrame(frame);
}
requestAnimationFrame(frame);
</script>
</body>
</html>
